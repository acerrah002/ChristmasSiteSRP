<!DOCTYPE HTML>
<html>
<head>

<script>
function dragstartHandler(ev) {
  ev.dataTransfer.setData("text", ev.target.id);
}

function dragoverHandler(ev) {
  ev.preventDefault();
}

function dropHandler(ev) {
  ev.preventDefault();
  const data = ev.dataTransfer.getData("text");
  ev.target.appendChild(document.getElementById(data));
}
</script>
</head>
<body>

<h1>Drag and Drop </h1>

<p>DrAg The PrEseNtS To ThE ChrIStMas TreE</p>


<br>
<img id="img1" src="Pixel Present.jpg" draggable="true" ondragstart="dragstartHandler(event)" width="336" height="69">
<img id="img1" src="Pixel Present.jpg" draggable="true" ondragstart="dragstartHandler(event)" width="336" height="69">
<img id="img1" src="Pixel Present.jpg" draggable="true" ondragstart="dragstartHandler(event)" width="336" height="69">

<div id="ChristmasTree">
<div id = "Divmt"></div>
<div id="div1" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)"></div>
<div id="div2" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)"></div>
<div id="div3" ondrop="dropHandler(event)"   ondragover="dragoverHandler(event)"></div>
</div>

<style>
body{
  text-align: center;
}

#div1,#div2,#div3  {
  height: 30px;
  padding-top: 20px;
  border: 1px solid #aaaaaa;

}

#Divmt{
  height: 250px;
}

#ChristmasTree{
  width: 350px;
  height: 300px;
  background-image: url("ChristmasTree.png");
  background-repeat: no-repeat;
  background-size: cover;
}
</style>
</body>
</html>
